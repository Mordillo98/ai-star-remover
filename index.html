<!DOCTYPE html>
<html lang="en">

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="description" content="Remove the Google Gemini star watermark from an image. Free, instant, 100% private — the image is processed in your browser and never uploaded.">
  <meta property="og:title" content="AI Star Remover — take the sparkle off a Gemini image">
  <meta property="og:description" content="100% in-browser. No upload, no logs, nothing stored.">

<body>

<header>
  <nav class="plate-strip" aria-label="site navigation">
    <span class="mark">✦</span>
    <span>AI Star Remover</span>
    <span class="spacer"></span>
    <span class="badge">100% free · no login · no upload</span>
  </nav>
</header>

<main>

  <!-- HERO + TOOL in one viewport. Left: headline/lead/CTA. Right: drop + preview. ─ -->
  <section class="hero-tool">
    <div class="hero-left">
      <h1>Take the <em>sparkle</em> off a Gemini image.</h1>
      <p class="lead">A free, private correction for the small star Google stamps into the corner of every Gemini picture. Runs in your browser. Nothing uploads. Nothing is kept.</p>
      <button class="btn-purp" onclick="document.getElementById('file').click()">Drop an image in →</button>
    </div>

    <div class="hero-right">
      <label class="drop" id="drop" for="file">
        <span class="verb">Drop an image, or choose a file.</span>
        <span class="note">ORIGINAL/UNMODIFIED PNG FILES ONLY</span>
        <input id="file" type="file" accept="image/png">
      </label>
      <div class="preview" id="preview"></div>
      <div class="status" id="status"></div>
    </div>
  </section>

  <!-- Page ends here, by design. Method & reading live on the blog. -->

</main>

<footer>© <span id="yr"></span> AI Star Remover &nbsp;·&nbsp; <a href="privacy">Privacy</a></footer>


<script>
// ── The tool: reverse alpha blend, client-side. Smart star detection. ──
(async function () {
  function loadAlphaCanvas(src,n){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>{const c=document.createElement('canvas');c.width=c.height=n;c.getContext('2d').drawImage(i,0,0,n,n);res(c);};i.onerror=rej;i.src=src;});}
  function tryLoadAlphaCanvas(src,n){return new Promise((res)=>{const i=new Image();i.onload=()=>{const c=document.createElement('canvas');c.width=c.height=n;c.getContext('2d').drawImage(i,0,0,n,n);res(c);};i.onerror=()=>res(null);i.src=src;});}
  const [a48,a96,a48b,a96b]=await Promise.all([
    loadAlphaCanvas('assets/bg_48.png',48),
    loadAlphaCanvas('assets/bg_96.png',96),
    tryLoadAlphaCanvas('assets/bg_48_new.png',48),
    tryLoadAlphaCanvas('assets/bg_96_new.png',96),
  ]);

  // Pre-build offsets AND full template data for NCC verification
  function buildOffsetsAndTemplate(canvas, n) {
    const ad = canvas.getContext('2d').getImageData(0, 0, n, n).data;
    const sRows = [], sCols = [], bRows = [], bCols = [];
    const tmpl = new Float32Array(n * n);
    let tmplSum = 0;
    for (let r = 0; r < n; r++) {
      for (let c = 0; c < n; c++) {
        const a = ad[(r * n + c) * 4] / 255;
        const raw = ad[(r * n + c) * 4];  // 0-131 alpha map value
        tmpl[r * n + c] = raw;
        tmplSum += raw;
        if (a > 0.05) { sRows.push(r); sCols.push(c); }
        else if (a < 0.01) { bRows.push(r); bCols.push(c); }
      }
    }
    const total = n * n;
    const tmplMean = tmplSum / total;
    const tmplSub = new Float32Array(total);
    let tmplVar = 0;
    for (let i = 0; i < total; i++) {
      const v = tmpl[i] - tmplMean;
      tmplSub[i] = v;
      tmplVar += v * v;
    }
    const tmplStd = Math.sqrt(tmplVar);
    return { sRows, sCols, bRows, bCols, n, alphaData: ad, tmpl, tmplMean, tmplSub, tmplStd };
  }
  // ponytail: dual alpha maps — old for legacy star, new for Gemini's updated watermark
  const maps48 = [buildOffsetsAndTemplate(a48, 48)];
  const maps96 = [buildOffsetsAndTemplate(a96, 96)];
  if (a48b) maps48.push(buildOffsetsAndTemplate(a48b, 48));
  if (a96b) maps96.push(buildOffsetsAndTemplate(a96b, 96));

  const drop=document.getElementById('drop'),fileInput=document.getElementById('file');
  fileInput.value=''; // clear any Firefox-restored file on reload
  const statusEl=document.getElementById('status'),previewEl=document.getElementById('preview');
  let srcBitmap=null,srcName=null,srcUrl=null,timer=null,lastOutUrl=null;

  function setStatus(m,c){statusEl.textContent=m||'';statusEl.className='status'+(c?' '+c:'');}
  function revokeOut(){ if(lastOutUrl){URL.revokeObjectURL(lastOutUrl);lastOutUrl=null;} }
  function armClear(){ if(timer)clearTimeout(timer); timer=setTimeout(()=>clear(true),30*1000); }
  function clearTimerObj(){ if(timer){clearTimeout(timer);timer=null;} if(srcUrl){URL.revokeObjectURL(srcUrl);srcUrl=null;} }

  function loadFile(file,native){
    if(!file)return;
    if(file.type!=='image/png' && !/\.png$/i.test(file.name)){
      setStatus('PNG files only.','err');return;
    }
    if(!native){const dt=new DataTransfer();dt.items.add(file);fileInput.files=dt.files;}
    clearTimerObj();revokeOut();previewEl.innerHTML='';
    srcName=file.name;
    createImageBitmap(file).then(b=>{
      srcBitmap=b;
      if(srcUrl)URL.revokeObjectURL(srcUrl);
      srcUrl=URL.createObjectURL(file);
      setStatus(`Processing ${file.name}…`);
      remove();
    }).catch(e=>setStatus('Could not load: '+e.message,'err'));
  }
  document.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('drag');});
  document.addEventListener('dragleave',e=>{if(!e.relatedTarget&&e.clientX===0&&e.clientY===0)drop.classList.remove('drag');});
  document.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('drag');loadFile(e.dataTransfer.files[0]);});
  fileInput.addEventListener('change',e=>loadFile(e.target.files[0],true));
  fileInput.addEventListener('drop',e=>{e.preventDefault();e.stopPropagation();loadFile(e.dataTransfer.files[0]);});

  // Fast brightness-delta score at a position
  function bdScore(gray, w, x, y, off) {
    const { sRows, sCols, bRows, bCols, n } = off;
    const base = y * w + x;
    let ss = 0;
    for (let i = 0; i < sRows.length; i++) ss += gray[base + sRows[i] * w + sCols[i]];
    let bs = 0;
    for (let i = 0; i < bRows.length; i++) bs += gray[base + bRows[i] * w + bCols[i]];
    return ss / sRows.length - bs / bRows.length;
  }

  // Normalized cross-correlation (NCC) at a position — same as TM_CCOEFF_NORMED
  function nccScore(gray, w, x, y, off) {
    const { n, tmplSub, tmplStd } = off;
    const total = n * n;
    // Pass 1: patch mean
    let psum = 0;
    for (let r = 0; r < n; r++) {
      const rowBase = (y + r) * w + x;
      for (let c = 0; c < n; c++) psum += gray[rowBase + c];
    }
    const pmean = psum / total;
    // Pass 2: dot product and patch std
    let dot = 0, pvar = 0;
    for (let r = 0; r < n; r++) {
      const rowBase = (y + r) * w + x;
      for (let c = 0; c < n; c++) {
        const pv = gray[rowBase + c] - pmean;
        dot += pv * tmplSub[r * n + c];
        pvar += pv * pv;
      }
    }
    const pstd = Math.sqrt(pvar);
    if (pstd < 1e-10 || tmplStd < 1e-10) return 0;
    return dot / (pstd * tmplStd);
  }

  // Binary-search optimal alpha scale to avoid black pixels
  // ponytail: Gemini changes opacity over time — this adapts per image
  function findOptimalScale(data, w, x, y, off) {
    const { n, alphaData } = off;
    const TH = 0.002, MAXA = 0.99, L = 255;
    let lo = 0.05, hi = 1.0;
    for (let iter = 0; iter < 15; iter++) {
      const mid = (lo + hi) / 2;
      let neg = 0, total = 0;
      for (let r = 0; r < n; r++) {
        for (let c = 0; c < n; c++) {
          const a = (alphaData[(r * n + c) * 4] / 255) * mid;
          if (a < TH) continue;
          const am = Math.min(a, MAXA);
          const px = ((y + r) * w + (x + c)) * 4;
          for (let ch = 0; ch < 3; ch++) {
            const wm = data[px + ch];
            if (wm <= 5) continue;  // skip already-black pixels
            const orig = (wm - am * L) / (1 - am);
            total++;
            if (orig < 0) neg++;
          }
        }
      }
      if (total === 0) { lo = mid; continue; }
      if (neg / total < 0.005) lo = mid;  // <0.5% black → try higher
      else hi = mid;
    }
    return lo;
  }

  // Find star: try all alpha maps, pick the one with highest NCC
  function findStarPosition(gray, w, h, maps, cornerX, cornerY) {
    let bestResult = null, bestOff = maps[0];
    for (const off of maps) {
      const { sRows, bRows, n } = off;
      if (!sRows.length || !bRows.length) continue;

      const sx = Math.floor(w / 2), sy = Math.floor(h / 2);
      const ex = w - n, ey = h - n;
      if (sx > ex || sy > ey) continue;

      // Coarse brightness-delta scan
      const step = Math.max(4, Math.floor(n / 8));
      const candidates = [];
      for (let y = sy; y <= ey; y += step) {
        for (let x = sx; x <= ex; x += step) {
          candidates.push({ x, y, score: bdScore(gray, w, x, y, off) });
        }
      }
      candidates.sort((a, b) => b.score - a.score);

      // NCC-verify top 3
      const topK = candidates.slice(0, 3);
      for (const c of topK) c.ncc = nccScore(gray, w, c.x, c.y, off);
      topK.sort((a, b) => b.ncc - a.ncc);

      // NCC at corner
      const cornerNcc = nccScore(gray, w, cornerX, cornerY, off);

      const TM_CORNER = 0.35, TM_MOVED = 0.65, TM_RATIO = 1.5;
      let result;
      if (cornerNcc > TM_CORNER) {
        result = { x: cornerX, y: cornerY, score: cornerNcc, source: 'corner' };
      } else if (topK[0].ncc > TM_MOVED && topK[0].ncc > cornerNcc * TM_RATIO) {
        result = { x: topK[0].x, y: topK[0].y, score: topK[0].ncc, source: 'detected' };
      } else {
        result = { x: cornerX, y: cornerY, score: 0, source: 'fallback' };
      }

      if (!bestResult || result.score > bestResult.score) {
        bestResult = result;
        bestOff = off;
      }
    }
    return { ...bestResult, off: bestOff };
  }

  function remove(){
    if(!srcBitmap)return;
    setStatus('Scanning for watermark…');
    const w=srcBitmap.width,h=srcBitmap.height;
    const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
    const ctx=canvas.getContext('2d');ctx.drawImage(srcBitmap,0,0);
    const imgData=ctx.getImageData(0,0,w,h),data=imgData.data;
    const large=w>1024&&h>1024, maps=large?maps96:maps48, n=maps[0].n;

    // Build grayscale array
    const gray = new Float32Array(w * h);
    const len = w * h;
    for (let i = 0; i < len; i++) {
      const j = i * 4;
      gray[i] = 0.299 * data[j] + 0.587 * data[j + 1] + 0.114 * data[j + 2];
    }

    // Find the star using brightness-delta + NCC verification
    const margin = large ? 64 : 32;
    const cornerX = w - margin - n, cornerY = h - margin - n;
    const pos = findStarPosition(gray, w, h, maps, cornerX, cornerY);
    const off = pos.off;
    let x0 = pos.x, y0 = pos.y;
    console.log('star: ' + pos.source + ' (' + x0 + ',' + y0 + ') ncc=' + pos.score.toFixed(3));
    if(x0<0||y0<0){setStatus('Image too small.','err');return;}

    setStatus(`Removing watermark at (${x0},${y0})…`);
    const ad=off.alphaData;
    const TH=0.002,MAXA=0.99,L=255;let changed=0;

    // Auto-scale alpha to avoid black pixels (Gemini changes opacity)
    const scale = findOptimalScale(data, w, x0, y0, off);
    console.log('alpha scale:', scale.toFixed(3));

    for(let r=0;r<n;r++){
      for(let c=0;c<n;c++){
        let alpha=(ad[(r*n+c)*4]/255)*scale; if(alpha<TH)continue; alpha=Math.min(alpha,MAXA);
        const px=((y0+r)*w+(x0+c))*4;
        for(let k=0;k<3;k++){
          const wm=data[px+k],o=(wm-alpha*L)/(1-alpha),v=Math.max(0,Math.min(255,Math.round(o)));
          if(Math.abs(v-wm)>5)changed++; data[px+k]=v;
        }
      }
    }
    ctx.putImageData(imgData,0,0);
    canvas.toBlob(blob=>{
      revokeOut();
      lastOutUrl=URL.createObjectURL(blob);
      const base=srcName.replace(/\.[^.]+$/,'');
      const a=document.createElement('a');a.href=lastOutUrl;a.download=base+'_clean.png';
      const beforeUrl=srcUrl;

      previewEl.innerHTML =
        `<div class="ba">
           <div class="frame"><img src="${beforeUrl}" alt="before"><span class="tag">before</span></div>
           <div class="frame"><img src="${lastOutUrl}" alt="after"><span class="tag ok">after · ✓</span></div>
         </div>
         <div class="row"><button class="btn-dl" id="dl">Download the clean image</button><button class="btn-purp" id="again">CLEAR</button><span class="timer" id="t">auto-clears in 30s</span></div>`;
      document.getElementById('dl').onclick=()=>a.click();
      document.getElementById('again').onclick=()=>clear(false);
      setStatus('');
      (function(){let s=30;const el=document.getElementById('t');const iv=setInterval(()=>{s--;if(s<=0){clearInterval(iv);return;}el.textContent=`auto-clears in ${s}s`;},1000);})();
      armClear();
    },'image/png');
  }
  function clear(auto){
    clearTimerObj();revokeOut();previewEl.innerHTML='';
    srcBitmap=null;srcName=null;fileInput.value='';
    setStatus('');
  }
})();
document.getElementById('yr').textContent=new Date().getFullYear();
</script>
</body>
